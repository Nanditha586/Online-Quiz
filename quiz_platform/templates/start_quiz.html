{% extends 'base.html' %}

{% block content %}

<style>

body{
    background:#f4f7fc;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto 120px;
}

h1{
    text-align:center;
    color:#1e3c72;
    margin-bottom:20px;
}

/* TIMER */

.timer{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#dc3545;
    margin-bottom:15px;
}

/* PROGRESS BAR */

.progress-container{
    width:100%;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:25px;
}

#progressBar{
    width:0%;
    height:18px;
    background:#2563eb;
    transition:0.3s;
}

/* QUESTION CARD */

.question-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.question-box h3{
    color:#1e3c72;
    margin-bottom:15px;
}

.question-box p{
    font-size:18px;
    margin-bottom:25px;
    font-weight:600;
}

/* OPTIONS */

.option-label{
    display:block;
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
    border:1px solid #ddd;
}

.option-label:hover{
    background:#eef4ff;
    border-color:#2a5298;
}

.option-label input{
    margin-right:10px;
}

/* FIXED BUTTON BAR */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    box-shadow:0 -4px 15px rgba(0,0,0,.1);
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:999;
}

.left-buttons{
    display:flex;
    gap:10px;
}

.quiz-btn{
    background:#2a5298;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.quiz-btn:hover{
    opacity:.9;
}

.submit-btn{
    background:#198754;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

.submit-btn:hover{
    opacity:.9;
}

@media(max-width:768px){

    .bottom-nav{
        flex-direction:column;
        gap:15px;
    }

    .left-buttons{
        flex-wrap:wrap;
        justify-content:center;
    }

    .submit-btn{
        width:100%;
    }
}

</style>

<div class="container">

    <h1>{{ quiz.title }}</h1>

    <!-- TIMER -->
    <div class="timer" id="timer"></div>

    <!-- PROGRESS BAR -->
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <form method="POST"
          action="/submit-quiz/{{ quiz.id }}/"
          id="quizForm">

        {% csrf_token %}

        {% for question in questions %}

        <div class="question-box" style="display:none;">

            <h3>
                Question {{ forloop.counter }}
            </h3>

            <p>
                {{ question.question }}
            </p>

            <label class="option-label">
                <input type="radio"
                       name="q_{{ question.id }}"
                       value="{{ question.option1 }}"
                       onchange="saveAnswer('{{ question.id }}','{{ question.option1 }}')">
                {{ question.option1 }}
            </label>

            <label class="option-label">
                <input type="radio"
                       name="q_{{ question.id }}"
                       value="{{ question.option2 }}"
                       onchange="saveAnswer('{{ question.id }}','{{ question.option2 }}')">
                {{ question.option2 }}
            </label>

            <label class="option-label">
                <input type="radio"
                       name="q_{{ question.id }}"
                       value="{{ question.option3 }}"
                       onchange="saveAnswer('{{ question.id }}','{{ question.option3 }}')">
                {{ question.option3 }}
            </label>

            <label class="option-label">
                <input type="radio"
                       name="q_{{ question.id }}"
                       value="{{ question.option4 }}"
                       onchange="saveAnswer('{{ question.id }}','{{ question.option4 }}')">
                {{ question.option4 }}
            </label>

        </div>

        {% endfor %}

        <!-- FIXED BUTTON BAR -->

        <div class="bottom-nav">

            <div class="left-buttons">

                <button
                    type="button"
                    class="quiz-btn"
                    onclick="clearResponse()">
                    Clear Response
                </button>

                <button
                    type="button"
                    class="quiz-btn"
                    onclick="previousQuestion()">
                    Previous
                </button>

                <button
                    type="button"
                    class="quiz-btn"
                    onclick="nextQuestion()">
                    Next
                </button>

            </div>

            <button
                type="submit"
                class="submit-btn">
                Submit Quiz
            </button>

        </div>

    </form>

</div>

<script>

let currentQuestion = 0;
let questions = document.querySelectorAll('.question-box');
let progressBar = document.getElementById('progressBar');

function showQuestion(index){

    questions.forEach(
        q => q.style.display='none'
    );

    questions[index].style.display='block';

    let progress =
        ((index + 1) / questions.length) * 100;

    progressBar.style.width =
        progress + '%';
}

function nextQuestion(){

    if(currentQuestion < questions.length - 1){

        currentQuestion++;

        showQuestion(currentQuestion);
    }
}

function previousQuestion(){

    if(currentQuestion > 0){

        currentQuestion--;

        showQuestion(currentQuestion);
    }
}

function saveAnswer(
    questionId,
    selectedAnswer
){

    fetch('/save-answer/',{

        method:'POST',

        headers:{
            'Content-Type':
            'application/x-www-form-urlencoded',

            'X-CSRFToken':
            '{{ csrf_token }}'
        },

        body:
            'question_id=' + questionId +
            '&selected_answer=' +
            encodeURIComponent(selectedAnswer) +
            '&quiz_id={{ quiz.id }}'
    });
}

function clearResponse(){

    let currentBox =
        questions[currentQuestion];

    let questionId =
        currentBox.querySelector(
            'input[type="radio"]'
        ).name.replace('q_','');

    let radios =
        currentBox.querySelectorAll(
            'input[type="radio"]'
        );

    radios.forEach(
        r => r.checked = false
    );

    fetch('/save-answer/',{

        method:'POST',

        headers:{
            'Content-Type':
            'application/x-www-form-urlencoded',

            'X-CSRFToken':
            '{{ csrf_token }}'
        },

        body:
            'question_id=' + questionId +
            '&selected_answer=' +
            '&quiz_id={{ quiz.id }}'
    });
}

/* TIMER */

let timeLeft =
    {{ quiz.duration }} * 60;

let timer =
    document.getElementById(
        "timer"
    );

let countdown =
setInterval(() => {

    let min =
        Math.floor(timeLeft / 60);

    let sec =
        timeLeft % 60;

    timer.innerHTML =
        `${min}:${sec < 10 ? '0'+sec : sec}`;

    timeLeft--;

    if(timeLeft < 0){

        clearInterval(countdown);

        alert("Time Over!");

        document
        .getElementById(
            "quizForm"
        )
        .submit();
    }

},1000);

showQuestion(currentQuestion);

window.onbeforeunload =
() => "Leave quiz?";

</script>

{% endblock %}
