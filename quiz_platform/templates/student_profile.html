{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Student Profile</title>

<style>

body{
    font-family:'Segoe UI';
    background:#f4f7fc;
}

.container{
    width:700px;
    margin:40px auto;
}

.profile-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.profile-row{
    margin-bottom:15px;
}

.label{
    font-weight:bold;
    color:#1e3c72;
}

.value{
    margin-top:5px;
}

.edit-btn{
    background:#1e3c72;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

.edit-btn:hover{
    opacity:.9;
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.modal-content{
    background:white;
    width:500px;
    margin:5% auto;
    padding:25px;
    border-radius:15px;
}

.modal-content input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

.save-btn{
    background:#198754;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
}

.close-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

    <div class="profile-card">

        <h2>Student Profile</h2>

        <br>

        <div class="profile-row">
            <div class="label">Username</div>
            <div class="value">
                {{ user.username }}
            </div>
        </div>

        <div class="profile-row">
            <div class="label">Email</div>
            <div class="value">
                {{ user.email }}
            </div>
        </div>

        <div class="profile-row">
            <div class="label">Branch</div>
            <div class="value">
                {{ profile.branch }}
            </div>
        </div>

        <div class="profile-row">
            <div class="label">Year</div>
            <div class="value">
                {{ profile.year }}
            </div>
        </div>

        <br>

        <button
            class="edit-btn"
            onclick="openModal()"
        >
            Edit Profile
        </button>

    </div>

</div>

<!-- Modal -->

<div
    id="editModal"
    class="modal"
>

    <div class="modal-content">

        <h2>Edit Profile</h2>

        <br>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                value="{{ user.username }}"
                readonly
            >

            <input
                type="email"
                value="{{ user.email }}"
                readonly
            >

            <input
                type="text"
                name="branch"
                value="{{ profile.branch }}"
                readonly
            >

            <input
                type="text"
                name="year"
                value="{{ profile.year }}"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="New Password"
            >

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
            >

            <button
                type="submit"
                class="save-btn"
            >
                Save Changes
            </button>

            <button
                type="button"
                class="close-btn"
                onclick="closeModal()"
            >
                Cancel
            </button>

        </form>

    </div>

</div>

<script>

function openModal(){
    document.getElementById(
        "editModal"
    ).style.display="block";
}

function closeModal(){
    document.getElementById(
        "editModal"
    ).style.display="none";
}

window.onclick=function(event){

    let modal=
    document.getElementById(
        "editModal"
    );

    if(event.target==modal){
        modal.style.display="none";
    }
}

</script>

</body>
</html>
